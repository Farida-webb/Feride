<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Game </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Chess Game by Farida</h2>
  <p>İstədiyiniz xanaya klikləyərək “1” nömrəsini təyin edin, sonra <strong>Start</strong> düyməsinə basın.<br>
    Əgər yenidən başlamaq istəyirsizsə <strong>Start again</strong> toxunun.</p>
  <button id="startButton">Start</button>
  <button id="restartButton">Start again</button>
  <div id="chessboard"></div>
  <script src="script.js"></script>
</body>
</html>
